<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="white"/>

  <!-- Vertical bar of L -->
  <rect x="25" y="18" width="12" height="60" fill="#22c55e" stroke="#000" stroke-width="1.5"/>

  <!-- Horizontal bar of L -->
  <rect x="25" y="66" width="36" height="12" fill="#22c55e" stroke="#000" stroke-width="1.5"/>

  <!-- Darker green accent on vertical bar -->
  <rect x="33" y="30" width="8" height="36" fill="#16a34a" stroke="#000" stroke-width="0.5"/>

  <!-- Black accent marks on left -->
  <line x1="16" y1="22" x2="22" y2="22" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="22" y2="28" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="22" y2="34" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Right side accent dot -->
  <circle cx="72" cy="48" r="3" fill="#000"/>
</svg>
